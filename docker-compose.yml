version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gamecolla-postgres
    environment:
      POSTGRES_DB: gamecolla
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: gamecolla-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: gamecolla-backend
    depends_on:
      - postgres
      - redis
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - REDIS_HOST=redis
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - repo_storage:/app/repositories
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: gamecolla-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  repo_storage:
